version: '3.8'

services:
  db:
    image: postgres:13
    container_name: cineplex_postgres
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=airflow
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cineplex-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: cineplex_redis
    networks:
      - cineplex-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-webserver:
    build:
      context: .
      dockerfile: ./Dockerfile.airflow
    container_name: cineplex_airflow_webserver
    command: >
      bash -c "airflow db init && 
      airflow users create --username airflow --firstname Air --lastname Flow --role Admin --email airflow@example.com --password airflow || true && 
      airflow webserver"
    ports:
      - '8080:8080'
    environment: &airflow-env
      - AIRFLOW_HOME=/airflow
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://user:password@db:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/0
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://user:password@db:5432/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./dags:/airflow/dags
      - ./data:/opt/data:rw
      - airflow_logs:/airflow/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cineplex-network

  airflow-scheduler:
    build:
      context: .
      dockerfile: ./Dockerfile.airflow # ย้ายมาอยู่ใน build แล้ว
    container_name: cineplex_airflow_scheduler
    command: airflow scheduler
    environment: *airflow-env
    volumes:
      - ./dags:/airflow/dags
      - ./data:/opt/data:rw
      - airflow_logs:/airflow/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cineplex-network

  airflow-worker:
    build:
      context: .
      dockerfile: ./Dockerfile.airflow
    container_name: cineplex_airflow_worker
    command: airflow celery worker
    environment: *airflow-env
    volumes:
      - ./dags:/airflow/dags
      - ./data:/opt/data:rw
      - airflow_logs:/airflow/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cineplex-network

  spark:
    image: apache/spark:latest
    container_name: cineplex_spark_master
    environment:
      - SPARK_MODE=master
    ports:
      - '7077:7077'
      - '18080:8080'
    networks:
      - cineplex-network

  spark-worker:
    image: apache/spark:latest
    container_name: cineplex_spark_worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark:7077
    networks:
      - cineplex-network
    depends_on:
      - spark

networks:
  cineplex-network:
    driver: bridge

volumes:
  postgres_data:
  airflow_logs: